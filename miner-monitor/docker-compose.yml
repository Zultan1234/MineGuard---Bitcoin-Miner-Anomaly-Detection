version: '3.9'

services:
  backend:
    build: ./backend
    ports:
      - "5002:5002"
    volumes:
      - miner_data:/app/data
    environment:
      - DB_PATH=/app/data/miner_monitor.db
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5001:5001"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  miner_data:
